spring:
  application:
    name: api-gateway

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8091/realms/enerlytics/protocol/openid-connect/certs
          issuer-uri: http://localhost:8091/realms/enerlytics

security:
  excluded:
    urls: /actuator/**, /swagger-ui.html, /swagger-ui/**, /v3/api-docs/**, /swagger-resources/**, /docs/**

springdoc:
  swagger-ui:
    urls:
      - name: user-service
        url: /docs/user-service
      - name: device-service
        url: /docs/device-service
      - name: ingestion-service
        url: /docs/ingestion-service
      - name: insight-service
        url: /docs/insight-service

management:
  metrics:
    tags:
      application: ${spring.application.name}
  health:
    circuitbreakers:
      enabled: true
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health, info, metrics, circuitbreakers, prometheus

resilience4j:
  circuitbreaker:
    configs:
        default:
          registerHealthIndicator: true
          slidingWindowType: COUNT_BASED
          slidingWindowSize: 8
          failureRateThreshold: 20
          minimum-number-of-calls: 4
          waitDurationInOpenState: 5s
          permittedNumberOfCallsInHalfOpenState: 2
          automaticTransitionFromOpenToHalfOpenEnabled: true

server:
  port: 9000
