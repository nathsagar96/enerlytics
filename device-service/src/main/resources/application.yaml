spring:
  application:
    name: device-service

  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5433/devices
    username: postgres
    password: password

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

  mvc:
    problemdetails:
      enabled: true

server:
  port: 8081

management:
  metrics:
    tags:
      application: ${spring.application.name}
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
