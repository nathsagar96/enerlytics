server:
  port: ${SERVER_PORT:8085}

spring:
  application:
    name: insight-service

  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${OLLAMA_MODEL:qwen2.5-coder:0.5b}
      init:
        pull-model-strategy: never

  mvc:
    problemdetails:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

usage-service:
  base-url: ${USAGE_SERVICE_URL:http://localhost:8083/api/v1/usages}

app:
  openapi:
    server-url: ${OPENAPI_SERVER_URL:http://localhost:8085}
    server-description: ${OPENAPI_SERVER_DESCRIPTION:Local environment}
